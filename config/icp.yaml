# Who Alaska AI pursues, and how the routine scores fit. Tuned for a small market
# with limited at-bats. Few, high-fit, reachable, never generic.

targeting:
  geography: >
    Alaska. Businesses operating in state, or Alaska Native corporations
    headquartered in state even where revenue is earned Outside.
  lead_segments:
    - name: "Tourism and visitor industry"
      why: >
        Brutal seasonal labor scarcity, booking and front-desk load, multilingual
        guests. Voice and content agents pay fast.
      examples: "Lodges, tour and activity operators, guides, hospitality, charters."
      signals: >
        A four-month season, phone-based booking, seasonal hiring posts, a wall of
        reviews mentioning wait times or missed calls.
    - name: "Independent healthcare and elder care"
      why: >
        Documentation, scheduling, intake, prior-auth. High ROI, strong ability to
        pay. Target independent practices, not the big systems.
      signals: >
        Independent (not Providence or a tribal-health system), taking new
        patients, a small front-desk team, paperwork-heavy.
    - name: "Alaska Native corporations and tribal enterprises"
      why: >
        Federal contracting and 8(a) volume means heavy proposals and compliance
        drafting. Best ability to pay in the state. Anchor accounts.
      signals: >
        Multiple subsidiaries, a federal-contracting or 8(a) footprint, a proposal
        or capture team, government-services lines of business.
    - name: "Other labor-scarce or paperwork-heavy Alaska SMBs"
      why: >
        Logistics, professional services, contractors, utilities suppliers. If
        labor is scarce or filings never stop, AI pays.
      signals: >
        Chronic hiring posts, a permit or compliance load, a back office drowning
        in repetitive work.

scoring:
  # Score each candidate 0 to 5 per criterion, total the five, pick the highest.
  # Anchors so scouts score consistently, not optimistically.
  ai_solvable_pain:
    what: "How clear and painful is a problem AI can actually carry."
    high: "A specific, repeating, expensive pain AI is proven to handle, missed calls, booking, intake, proposals."
    low: "No visible pain, or a pain AI cannot honestly solve."
  ability_to_pay:
    what: "Revenue and stability enough for a Field Study and a build."
    high: "Established, multi-location or multi-subsidiary, clearly funded."
    low: "Micro shop with no payroll and no budget."
  reachability:
    what: "Can we verify a real decision-maker and a real contact."
    high: "A named owner or lead with a public business email on the site."
    low: "No named human and no contact anywhere findable."
  offer_fit:
    what: "How well their pain maps to what we build and can prove."
    high: "Their top pain is exactly a voice agent, paperwork engine, or automation we ship."
    low: "Their need is outside what we build."
  alaska_signal:
    what: "Genuinely Alaskan, where buy-local and being-here helps."
    high: "Rooted in Alaska, community-embedded, values a local partner."
    low: "A national chain with an Alaska pin on a map."

disqualifiers:
  - "Already in leadflow.leads or leadflow.suppressions (dedupe by normalized domain)."
  - "Sole proprietors and micro-shops with no payroll and no budget."
  - "Direct competitors, any AI or automation agency."
  - "No verifiable, real contact anywhere findable."
  - "Seafood processing while margins are in crisis, unless a clear payer."
  - "Anyone where the discovery room honestly finds no AI build that pays."
  - "Reputation or values conflict, work that would embarrass the brand or cut
     against its public voice. Drop with a one-line note and replace."
